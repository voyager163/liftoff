name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/templates.ts

      - uses: actions/setup-go@v7
        with:
          go-version: "1.23"
          cache-dependency-path: src/standard-templates.ts

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.12.5

      - name: Install dependencies
        run: npm ci

      - name: Run package check
        run: npm run check

      - name: Run package smoke test
        run: npm run smoke:package
